<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Night Log ✨</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#d6c6f5">

<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<style>
:root {
  --main-purple: #d6c6f5;
  --bg-color: #0d0d0f;
  --card-bg: #1a1a1c;
}

/* 🎬 인트로 스플래시 화면 스타일 */
#splash-screen {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: var(--bg-color);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  transition: opacity 1s ease-out, visibility 1s;
  /* 페이드인 애니메이션 */
  animation: fadeIn 1.5s ease-in-out forwards;
}

#splash-moon {
  font-size: 80px;
  margin-bottom: 20px;
  /* 빙글빙글 회전 애니메이션 */
  animation: spin 3s linear infinite;
}

#splash-title {
  font-size: 24px;
  letter-spacing: 4px;
  color: var(--main-purple);
  font-weight: bold;
}

/* 인트로가 사라질 때 쓰는 클래스 */
.fade-out {
  opacity: 0;
  visibility: hidden;
}

/* 애니메이션 정의 */
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* 메인 UI 스타일 */
body {
  margin: 0;
  background: var(--bg-color);
  color: white;
  font-family: 'Gowun Batang', serif;
  display: flex;
  flex-direction: column;
  align-items: center;
}

h2 { margin: 30px 0; letter-spacing: 2px; }

#calendar-container {
  width: 95%;
  max-width: 800px;
  margin-bottom: 30px;
}

#calendar {
  background: rgba(255, 255, 255, 0.03);
  border-radius: 20px;
  padding: 15px;
  border: 1px solid rgba(255,255,255,0.1);
}

.fc-daygrid-day-number { font-size: 11px !important; padding: 4px !important; color: #888; }
.fc-col-header-cell-cushion { font-size: 13px; color: #aaa; }
.fc { --fc-border-color: rgba(255,255,255,0.05); color: white; }

.fc-event-title {
  display: block;
  text-align: center;
  font-size: 14px !important;
  cursor: pointer;
}

.fc-daygrid-event { background: transparent !important; border: none !important; outline: none !important; }

.input-section {
  width: 90%;
  max-width: 500px;
  padding: 20px;
  background: var(--card-bg);
  border-radius: 20px;
  margin-bottom: 50px;
}

input, textarea {
  width: 100%;
  padding: 15px;
  background: #252528;
  border: 1px solid #333;
  border-radius: 12px;
  color: white;
  font-family: inherit;
  box-sizing: border-box;
  margin-bottom: 15px;
}

.mood-selector { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
.mood-selector span { font-size: 28px; cursor: pointer; transition: 0.2s; opacity: 0.3; }
.mood-selector span.active { opacity: 1; transform: scale(1.3); }

button {
  width: 100%;
  padding: 15px;
  border-radius: 12px;
  border: none;
  background: var(--main-purple);
  color: #111;
  font-weight: bold;
  font-family: inherit;
  cursor: pointer;
}

#popup {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.85);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

.popup-box {
  background: var(--card-bg);
  padding: 25px;
  border-radius: 25px;
  width: 85%;
  max-width: 400px;
  border: 1px solid #444;
}

.btn-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
.btn-full { grid-column: span 2; }
.btn-delete { background: #442222; color: #ff8888; }
.btn-close { background: #333; color: white; }

</style>
</head>
<body>

<div id="splash-screen">
  <div id="splash-moon">🌙</div>
  <div id="splash-title">Night Log</div>
</div>

<h2>✨ Night Log</h2>

<div id="calendar-container">
  <div id="calendar"></div>
</div>

<div class="input-section">
  <input id="memo" placeholder="오늘 밤의 짧은 생각">
  <div class="mood-selector" id="main-moods">
    <span onclick="setMood('😊', 'main')">😊</span>
    <span onclick="setMood('😌', 'main')">😌</span>
    <span onclick="setMood('🥰', 'main')">🥰</span>
    <span onclick="setMood('😢', 'main')">😢</span>
    <span onclick="setMood('🪐', 'main')">🪐</span>
  </div>
  <button onclick="saveToday()">오늘 기록 저장</button>
</div>

<div id="popup">
  <div class="popup-box">
    <h3 id="popup-date" style="margin: 0 0 15px 0; text-align: center; font-size: 16px;"></h3>
    <textarea id="popup-text" placeholder="어떤 밤이었나요?" rows="5"></textarea>
    
    <div class="mood-selector" id="popup-moods">
      <span onclick="setMood('😊', 'popup')">😊</span>
      <span onclick="setMood('😌', 'popup')">😌</span>
      <span onclick="setMood('🥰', 'popup')">🥰</span>
      <span onclick="setMood('😢', 'popup')">😢</span>
      <span onclick="setMood('🌙', 'popup')">🌙</span>
    </div>

    <div class="btn-container">
      <button class="btn-full" onclick="saveFromPopup()">저장하기</button>
      <button class="btn-delete" onclick="deleteRecord()">삭제</button>
      <button class="btn-close" onclick="closePopup()">닫기</button>
    </div>
  </div>
</div>

<script>
// 1. 인트로 처리: 2.5초 후에 사라짐
window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('splash-screen').classList.add('fade-out');
  }, 2500); // 2.5초 대기
});

// PWA 서비스 워커 등록
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

let selectedDate = "";
let currentMood = "";

function setMood(mood, type) {
  currentMood = mood;
  const containerId = type === 'main' ? 'main-moods' : 'popup-moods';
  document.querySelectorAll(`#${containerId} span`).forEach(s => {
    s.classList.remove('active');
    if(s.innerText === mood) s.classList.add('active');
  });
}

function getMoonPhase(date) {
  const lp = 2551443;
  const new_moon = new Date(1970, 0, 7, 20, 35, 0);
  const phase = ((date - new_moon) / 1000) % lp;
  const index = Math.floor((phase / lp) * 8);
  return ["🌑","🌒","🌓","🌔","🌕","🌖","🌗","🌘"][index];
}

function formatDate(date) {
  const d = new Date(date);
  let month = '' + (d.getMonth() + 1);
  let day = '' + d.getDate();
  const year = d.getFullYear();
  if (month.length < 2) month = '0' + month;
  if (day.length < 2) day = '0' + day;
  return [year, month, day].join('-');
}

function saveToday() {
  const text = document.getElementById("memo").value;
  const date = formatDate(new Date());
  if(!currentMood) return alert("감정을 선택해주세요.");
  performSave(date, text, currentMood);
}

function saveFromPopup() {
  const text = document.getElementById("popup-text").value;
  if(!currentMood) return alert("감정을 선택해주세요.");
  performSave(selectedDate, text, currentMood);
}

function performSave(date, text, mood) {
  let records = JSON.parse(localStorage.getItem("night-logs")) || {};
  records[date] = { text, mood };
  localStorage.setItem("night-logs", JSON.stringify(records));
  location.reload(); 
}

function openPopup(date) {
  selectedDate = date;
  const records = JSON.parse(localStorage.getItem("night-logs")) || {};
  const data = records[date];

  document.getElementById("popup-date").innerText = `${date} 의 밤`;
  document.getElementById("popup-text").value = data ? data.text : "";
  
  if(data && data.mood) {
    setMood(data.mood, 'popup');
  } else {
    currentMood = "";
    document.querySelectorAll('#popup-moods span').forEach(s => s.classList.remove('active'));
  }
  
  document.getElementById("popup").style.display = "flex";
}

function closePopup() { document.getElementById("popup").style.display = "none"; }

function deleteRecord() {
  if(!confirm("이 기록을 지울까요?")) return;
  let records = JSON.parse(localStorage.getItem("night-logs")) || {};
  delete records[selectedDate];
  localStorage.setItem("night-logs", JSON.stringify(records));
  location.reload();
}

document.addEventListener('DOMContentLoaded', function() {
  const calendarEl = document.getElementById('calendar');
  const savedRecords = JSON.parse(localStorage.getItem("night-logs")) || {};
  const events = [];
  const today = new Date();

  for (let i = -60; i <= 60; i++) {
    const d = new Date(today.getFullYear(), today.getMonth(), today.getDate() + i);
    const dateStr = formatDate(d);
    const record = savedRecords[dateStr];
    let title = getMoonPhase(d);
    if (record && record.mood) title += " " + record.mood;
    events.push({ title: title, start: dateStr, allDay: true });
  }

  const calendar = new FullCalendar.Calendar(calendarEl, {
    initialView: 'dayGridMonth',
    locale: 'ko',
    headerToolbar: { left: 'prev', center: 'title', right: 'next' },
    events: events,
    fixedWeekCount: false,
    dateClick: function(info) { openPopup(info.dateStr); },
    eventClick: function(info) { openPopup(formatDate(info.event.start)); }
  });
  calendar.render();
});
</script>

</body>
</html>
